name: Build Windows Executable

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --noconfirm --onefile --windowed --name "AzureFilesSyncer" syncer.py

      - name: Create ZIP Archive
        run: |
          Compress-Archive -Path dist\AzureFilesSyncer.exe, config.example.toml -DestinationPath AzureFilesSyncer-Windows.zip

      - name: Upload Artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: AzureFilesSyncer-Windows
          path: AzureFilesSyncer-Windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AzureFilesSyncer-Windows.zip
          generate_release_notes: true
